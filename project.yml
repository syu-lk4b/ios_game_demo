name: AIDungeon
options:
  bundleIdPrefix: com.syu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  AIDungeon:
    type: application
    platform: iOS
    sources:
      - AIDungeon
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: GameplayKit.framework

  AIDungeonTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AIDungeonTests
    dependencies:
      - target: AIDungeon
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
